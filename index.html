<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Farm HUD – Transport Tycoon</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:       #0a0d12;
  --panel:    #0f1420dd;
  --border:   rgba(80,200,120,0.18);
  --accent:   #4ec96e;
  --accent2:  #e8a020;
  --accent3:  #e05555;
  --dim:      rgba(255,255,255,0.35);
  --text:     #d4e8d4;
  --mono:     'Share Tech Mono', monospace;
  --sans:     'Rajdhani', sans-serif;
}

html,body{
  height:100%;
  background:transparent;
  pointer-events:none;
  font-family:var(--sans);
  color:var(--text);
  overflow:hidden;
}

/* ── WRAPPER ───────────────────────────────── */
#hud{
  position:fixed;
  top:24px; left:24px;
  width:420px;
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:10px;
  overflow:hidden;
  backdrop-filter:blur(14px);
  box-shadow:0 8px 32px rgba(0,0,0,.6), 0 0 0 1px rgba(78,201,110,.06);
  pointer-events:auto;
  resize:both;
  min-width:300px;
  min-height:160px;
  display:flex;
  flex-direction:column;
  font-size:13px;
}

/* ── TITLEBAR ──────────────────────────────── */
#titlebar{
  display:flex;
  align-items:center;
  gap:8px;
  background:rgba(10,13,18,.92);
  border-bottom:1px solid var(--border);
  padding:7px 10px;
  cursor:move;
  user-select:none;
  flex-shrink:0;
}
#titlebar .logo{
  font-family:var(--mono);
  font-size:11px;
  color:var(--accent);
  letter-spacing:.12em;
  white-space:nowrap;
  text-transform:uppercase;
}
#titlebar .spacer{flex:1}
#titlebar .pill{
  font-family:var(--mono);
  font-size:10px;
  color:var(--dim);
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  border-radius:4px;
  padding:2px 6px;
  white-space:nowrap;
}
#titlebar .pill.live{color:var(--accent);border-color:rgba(78,201,110,.25);animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.45}}

/* ── TOOLBAR ───────────────────────────────── */
#toolbar{
  display:flex;
  align-items:center;
  gap:6px;
  padding:6px 10px;
  border-bottom:1px solid var(--border);
  background:rgba(10,13,18,.5);
  flex-shrink:0;
}
.tbtn{
  font-family:var(--sans);
  font-size:11px;
  font-weight:600;
  letter-spacing:.04em;
  text-transform:uppercase;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.1);
  color:var(--text);
  border-radius:5px;
  padding:4px 10px;
  cursor:pointer;
  transition:background .15s, border-color .15s, color .15s;
}
.tbtn:hover{background:rgba(78,201,110,.12);border-color:rgba(78,201,110,.35);color:var(--accent)}
.tbtn.active{background:rgba(78,201,110,.15);border-color:rgba(78,201,110,.45);color:var(--accent)}

#refresh-select{
  font-family:var(--mono);
  font-size:11px;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.1);
  color:var(--text);
  border-radius:5px;
  padding:4px 6px;
  cursor:pointer;
}
#refresh-select:focus{outline:none}

.tbtn-spacer{flex:1}

/* ── SUMMARY BAR ───────────────────────────── */
#summary{
  display:flex;
  gap:0;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.sumcell{
  flex:1;
  text-align:center;
  padding:6px 4px;
  border-right:1px solid var(--border);
  font-size:11px;
  color:var(--dim);
  text-transform:uppercase;
  letter-spacing:.05em;
}
.sumcell:last-child{border-right:none}
.sumcell .val{
  display:block;
  font-family:var(--mono);
  font-size:16px;
  color:var(--text);
  line-height:1.2;
}
.sumcell .val.green{color:var(--accent)}
.sumcell .val.yellow{color:var(--accent2)}

/* ── FIELD LIST / GRID ─────────────────────── */
#field-container{
  flex:1;
  overflow-y:auto;
  padding:8px;
  scrollbar-width:thin;
  scrollbar-color:rgba(78,201,110,.2) transparent;
}

/* LIST VIEW */
#field-container.list .field-card{
  display:flex;
  align-items:center;
  gap:10px;
  padding:7px 10px;
  margin-bottom:4px;
  border-radius:6px;
  border:1px solid var(--border);
  background:rgba(255,255,255,.025);
  cursor:pointer;
  transition:background .12s, border-color .12s;
  position:relative;
  overflow:hidden;
}
#field-container.list .field-card:hover{
  background:rgba(78,201,110,.07);
  border-color:rgba(78,201,110,.3);
}
#field-container.list .field-card .fn{
  font-weight:700;
  font-size:13px;
  min-width:72px;
  text-transform:uppercase;
  letter-spacing:.04em;
}
#field-container.list .field-card .seed{
  font-family:var(--mono);
  font-size:11px;
  color:var(--dim);
  flex:1;
}
#field-container.list .field-card .fert-badge{
  font-size:10px;
  background:rgba(232,160,32,.15);
  border:1px solid rgba(232,160,32,.3);
  color:var(--accent2);
  border-radius:3px;
  padding:1px 5px;
  font-family:var(--mono);
}
#field-container.list .field-card .timer{
  font-family:var(--mono);
  font-size:12px;
  font-weight:600;
  min-width:70px;
  text-align:right;
}
#field-container.list .field-card .state-dot{
  width:8px; height:8px;
  border-radius:50%;
  flex-shrink:0;
}
#field-container.list .field-card .prog-bar{
  position:absolute;
  bottom:0; left:0;
  height:2px;
  transition:width .5s;
}

/* GRID VIEW */
#field-container.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:8px;
  align-content:start;
}
#field-container.grid .field-card{
  display:flex;
  flex-direction:column;
  gap:5px;
  padding:10px;
  border-radius:7px;
  border:1px solid var(--border);
  background:rgba(255,255,255,.025);
  cursor:pointer;
  transition:background .12s, border-color .12s;
  position:relative;
  overflow:hidden;
}
#field-container.grid .field-card:hover{
  background:rgba(78,201,110,.07);
  border-color:rgba(78,201,110,.3);
}
#field-container.grid .field-card .fn{
  font-weight:700;
  font-size:13px;
  text-transform:uppercase;
  letter-spacing:.04em;
}
#field-container.grid .field-card .seed{
  font-family:var(--mono);
  font-size:11px;
  color:var(--dim);
}
#field-container.grid .field-card .fert-badge{
  font-size:10px;
  background:rgba(232,160,32,.15);
  border:1px solid rgba(232,160,32,.3);
  color:var(--accent2);
  border-radius:3px;
  padding:1px 5px;
  font-family:var(--mono);
  align-self:flex-start;
}
#field-container.grid .field-card .timer{
  font-family:var(--mono);
  font-size:15px;
  font-weight:600;
  margin-top:4px;
}
#field-container.grid .field-card .state-dot{
  position:absolute;
  top:8px; right:8px;
  width:8px; height:8px;
  border-radius:50%;
}
#field-container.grid .field-card .prog-bar{
  position:absolute;
  bottom:0; left:0;
  height:3px;
  transition:width .5s;
}

/* STATE COLORS */
.state-ready   .state-dot{background:var(--accent);box-shadow:0 0 6px var(--accent)}
.state-ready   .timer{color:var(--accent)}
.state-ready   .prog-bar{background:var(--accent);width:100%}

.state-soon    .state-dot{background:var(--accent2);box-shadow:0 0 6px var(--accent2)}
.state-soon    .timer{color:var(--accent2)}
.state-soon    .prog-bar{background:var(--accent2)}

.state-growing .state-dot{background:#4a90d9;box-shadow:0 0 6px #4a90d9}
.state-growing .timer{color:#4a90d9}
.state-growing .prog-bar{background:#4a90d9}

/* ── DEBUG PANEL ───────────────────────────── */
#debug-panel{
  display:none;
  flex-direction:column;
  gap:4px;
  padding:8px;
  border-top:1px solid var(--border);
  max-height:160px;
  overflow-y:auto;
  background:rgba(0,0,0,.4);
  flex-shrink:0;
}
#debug-panel.open{display:flex}
#debug-panel h4{
  font-family:var(--mono);
  font-size:10px;
  color:var(--accent);
  letter-spacing:.1em;
  text-transform:uppercase;
  margin-bottom:2px;
}
#debug-log{
  font-family:var(--mono);
  font-size:10px;
  color:rgba(255,255,255,.5);
  word-break:break-all;
  line-height:1.6;
}

/* ── STATUS BAR ────────────────────────────── */
#statusbar{
  display:flex;
  align-items:center;
  gap:8px;
  padding:4px 10px;
  border-top:1px solid var(--border);
  background:rgba(10,13,18,.8);
  flex-shrink:0;
  font-family:var(--mono);
  font-size:10px;
  color:var(--dim);
}
#statusbar .last-update{margin-left:auto}

/* ── EMPTY STATE ───────────────────────────── */
#empty-state{
  display:none;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:8px;
  padding:32px 16px;
  color:var(--dim);
  font-size:12px;
  font-family:var(--mono);
  text-align:center;
}
#empty-state .icon{font-size:28px;opacity:.4}
</style>
</head>
<body>

<div id="hud">

  <!-- TITLEBAR -->
  <div id="titlebar" id="drag">
    <span class="logo">🌾 Farm HUD</span>
    <span class="pill live" id="live-pill">● LIVE</span>
    <span class="pill" id="tab-pill">TABBED</span>
    <span class="spacer"></span>
    <span class="pill" id="job-pill">—</span>
  </div>

  <!-- TOOLBAR -->
  <div id="toolbar">
    <button class="tbtn" id="btn-refresh" title="Force refresh data">↺ Refresh</button>
    <button class="tbtn" id="btn-layout" title="Toggle grid/list view">⊞ Grid</button>
    <select id="refresh-select" title="Auto-refresh interval">
      <option value="0">Auto: Off</option>
      <option value="1000" selected>Auto: 1s</option>
      <option value="60000">Auto: 1m</option>
      <option value="600000">Auto: 10m</option>
      <option value="3600000">Auto: 1h</option>
    </select>
    <span class="tbtn-spacer"></span>
    <button class="tbtn" id="btn-debug" title="Toggle debug panel">🛠</button>
  </div>

  <!-- SUMMARY -->
  <div id="summary">
    <div class="sumcell"><span class="val green" id="sum-ready">0</span>Ready</div>
    <div class="sumcell"><span class="val yellow" id="sum-soon">0</span>Soon</div>
    <div class="sumcell"><span class="val" id="sum-growing">0</span>Growing</div>
    <div class="sumcell"><span class="val" id="sum-total">0</span>Total</div>
  </div>

  <!-- FIELD LIST -->
  <div id="field-container" class="list">
    <div id="empty-state">
      <span class="icon">🌱</span>
      <span>No field data received yet.<br>Make sure you have the Farmer job active.</span>
    </div>
  </div>

  <!-- DEBUG PANEL -->
  <div id="debug-panel">
    <h4>⚡ Raw Data Interceptor — paste key names to devs</h4>
    <div id="debug-log">Waiting for game data…</div>
  </div>

  <!-- STATUS BAR -->
  <div id="statusbar">
    <span id="status-txt">Waiting for data…</span>
    <span class="last-update" id="last-update">—</span>
  </div>

</div>

<script>
(function(){

// ─── SEED DATA (from wiki) ────────────────────────────────────────────────
const SEED_GROW_TIMES = {
  'carrot':     15*60,
  'potato':     45*60,
  'tomato':     60*60,
  'corn':       90*60,
  'wheat':     105*60,
  'strawberry':120*60,
  'pumpkin':   180*60,
  'apple':     240*60,
  'orange':    300*60,
  'grape':     360*60,
  'peach':     420*60,
  'cherry':    480*60,
  'pear':      540*60,
  'banana':    660*60,
  'mango':     780*60,
  'pineapple': 900*60,
  'watermelon':960*60,
  'blueberry':1080*60,
  'raspberry': 1200*60,
  'blackberry':1440*60,
};

// ─── STATE ────────────────────────────────────────────────────────────────
let fields     = [];       // [{id, name, seed, plantedAt, fertilized, readyAt}]
let gameData   = {};       // raw key/value cache from game
let isGrid     = false;
let autoTimer  = null;
let autoInterval = 1000;
let lastUpdate = null;

// ─── MOCK DATA (active until real game data arrives with field keys) ───────
// Set MOCK_ACTIVE = false once you've identified the real data keys
const MOCK_ACTIVE = true;

function buildMockFields(){
  const now = Date.now();
  return [
    {id:'box',       name:'Box',       seed:'carrot',   fertilized:false, readyAt: now - 5000},
    {id:'pressure',  name:'Pressure',  seed:'potato',   fertilized:true,  readyAt: now + 18*60*1000},
    {id:'cable',     name:'Cable',     seed:'tomato',   fertilized:false, readyAt: now + 3*60*60*1000},
    {id:'pencil',    name:'Pencil',    seed:'corn',     fertilized:false, readyAt: now + 75*60*1000},
    {id:'chocolate', name:'Chocolate', seed:'wheat',    fertilized:true,  readyAt: now + 45*60*1000},
    {id:'boom',      name:'Boom',      seed:'grape',    fertilized:false, readyAt: now + 5*60*60*1000},
  ];
}

// ─── FIELD PARSING ────────────────────────────────────────────────────────
// TODO: Replace this function with real key parsing once you identify
// the actual data keys from the debug interceptor panel.
// Expected format (guesses to verify in-game with monitor.html):
//   farm_field_[id]_seed     → seed type string
//   farm_field_[id]_ready_at → unix timestamp (seconds)
//   farm_field_[id]_fertilized → boolean
// OR it might be a single JSON blob: farm_fields → "[{...},{...}]"
function parseFieldsFromGameData(data){
  const parsed = [];

  // Attempt 1: single JSON blob
  const blobKeys = ['farm_fields','fields','farming_fields','player_fields'];
  for(const k of blobKeys){
    if(data[k]){
      try{
        const arr = JSON.parse(data[k]);
        if(Array.isArray(arr)){
          arr.forEach(f => {
            if(f.name || f.id){
              parsed.push({
                id:         f.id || f.name,
                name:       f.name || f.id,
                seed:       (f.seed || f.seedType || 'unknown').toLowerCase(),
                fertilized: !!f.fertilized,
                readyAt:    f.readyAt ? f.readyAt*1000 : (f.ready_at ? f.ready_at*1000 : Date.now())
              });
            }
          });
          if(parsed.length > 0) return parsed;
        }
      }catch(e){}
    }
  }

  // Attempt 2: individual prefixed keys
  // farm_field_box_seed, farm_field_box_ready_at, farm_field_box_fertilized
  const fieldNames = Object.keys(data)
    .filter(k => /^farm_field_/.test(k))
    .map(k => k.replace(/^farm_field_/,'').split('_')[0])
    .filter((v,i,a)=>a.indexOf(v)===i);

  fieldNames.forEach(fn => {
    const seed   = data[`farm_field_${fn}_seed`] || data[`farm_field_${fn}_seedType`] || 'unknown';
    const fert   = !!(data[`farm_field_${fn}_fertilized`]);
    const rawTS  = data[`farm_field_${fn}_ready_at`] || data[`farm_field_${fn}_readyAt`];
    const readyAt = rawTS ? Number(rawTS)*1000 : Date.now();
    parsed.push({id:fn, name:fn.charAt(0).toUpperCase()+fn.slice(1), seed:seed.toLowerCase(), fertilized:fert, readyAt});
  });

  return parsed;
}

// ─── RENDER ───────────────────────────────────────────────────────────────
function getFieldState(f){
  const now = Date.now();
  const diff = f.readyAt - now;
  if(diff <= 0)           return 'ready';
  if(diff < 60*60*1000)   return 'soon';
  return 'growing';
}

function fmtTime(ms){
  if(ms <= 0) return 'READY';
  const s = Math.floor(ms/1000);
  const h = Math.floor(s/3600);
  const m = Math.floor((s%3600)/60);
  const sc = s%60;
  if(h>0) return `${h}h ${String(m).padStart(2,'0')}m`;
  if(m>0) return `${m}m ${String(sc).padStart(2,'0')}s`;
  return `${sc}s`;
}

function seedEmoji(seed){
  const map={carrot:'🥕',potato:'🥔',tomato:'🍅',corn:'🌽',wheat:'🌾',strawberry:'🍓',
    pumpkin:'🎃',apple:'🍎',orange:'🍊',grape:'🍇',peach:'🍑',cherry:'🍒',pear:'🍐',
    banana:'🍌',mango:'🥭',pineapple:'🍍',watermelon:'🍉',blueberry:'🫐',
    raspberry:'🍓',blackberry:'🫐'};
  return map[seed]||'🌱';
}

function getProgress(f){
  const seed = f.seed.replace(' seeds','').replace(' seed','');
  const growTime = SEED_GROW_TIMES[seed];
  if(!growTime) return 0;
  const actualGrow = f.fertilized ? growTime/2 : growTime;
  const plantedAt  = f.readyAt - actualGrow*1000;
  const elapsed    = Date.now() - plantedAt;
  return Math.min(1, Math.max(0, elapsed/(actualGrow*1000)));
}

function renderFields(list){
  const container = document.getElementById('field-container');
  const empty     = document.getElementById('empty-state');

  // Remove old cards
  container.querySelectorAll('.field-card').forEach(c=>c.remove());

  if(!list || list.length===0){
    empty.style.display='flex'; return;
  }
  empty.style.display='none';

  list.forEach(f => {
    const state    = getFieldState(f);
    const timeLeft = f.readyAt - Date.now();
    const progress = getProgress(f);
    const card     = document.createElement('div');
    card.className = `field-card state-${state}`;
    card.dataset.id = f.id;

    const fertBadge = f.fertilized ? '<span class="fert-badge">⚗ FERT</span>' : '';

    if(isGrid){
      card.innerHTML = `
        <span class="state-dot"></span>
        <div class="fn">${seedEmoji(f.seed)} ${f.name}</div>
        <div class="seed">${f.seed.charAt(0).toUpperCase()+f.seed.slice(1)}</div>
        ${fertBadge}
        <div class="timer">${fmtTime(timeLeft)}</div>
        <div class="prog-bar" style="width:${(progress*100).toFixed(1)}%"></div>
      `;
    } else {
      card.innerHTML = `
        <span class="state-dot"></span>
        <span class="fn">${seedEmoji(f.seed)} ${f.name}</span>
        <span class="seed">${f.seed.charAt(0).toUpperCase()+f.seed.slice(1)}</span>
        ${fertBadge}
        <span class="timer">${fmtTime(timeLeft)}</span>
        <div class="prog-bar" style="width:${(progress*100).toFixed(1)}%"></div>
      `;
    }

    card.addEventListener('click', () => onFieldClick(f));
    container.appendChild(card);
  });

  updateSummary(list);
}

function updateSummary(list){
  const ready   = list.filter(f=>getFieldState(f)==='ready').length;
  const soon    = list.filter(f=>getFieldState(f)==='soon').length;
  const growing = list.filter(f=>getFieldState(f)==='growing').length;
  document.getElementById('sum-ready').textContent   = ready;
  document.getElementById('sum-soon').textContent    = soon;
  document.getElementById('sum-growing').textContent = growing;
  document.getElementById('sum-total').textContent   = list.length;
}

// ─── LIVE TIMER TICK ──────────────────────────────────────────────────────
function tickTimers(){
  document.querySelectorAll('.field-card').forEach(card => {
    const f = fields.find(f=>f.id===card.dataset.id);
    if(!f) return;
    const state    = getFieldState(f);
    const timeLeft = f.readyAt - Date.now();
    const progress = getProgress(f);

    // update state class
    card.className = `field-card state-${state}`;

    // update timer text
    const timerEl = card.querySelector('.timer');
    if(timerEl) timerEl.textContent = fmtTime(timeLeft);

    // update progress bar
    const barEl = card.querySelector('.prog-bar');
    if(barEl) barEl.style.width = (progress*100).toFixed(1)+'%';
  });
  updateSummary(fields);
}

// ─── FIELD CLICK → WAYPOINT ──────────────────────────────────────────────
// TODO: Replace x/y with real field coordinates once known.
// Field coordinates need to be mapped manually or fetched from game data.
const FIELD_COORDS = {
  // Format: fieldId: [x, y]  (GTA map coordinates)
  // Paleto Bay area fields (approximate)
  'box':       [-319, 6390],
  'pressure':  [-335, 6370],
  'cable':     [-352, 6355],
  // Grapeseed area fields (approximate)
  'pencil':    [2370, 5150],
  'chocolate': [2390, 5130],
  'boom':      [2410, 5110],
  // Add more as you identify them in-game
};

function onFieldClick(f){
  const coords = FIELD_COORDS[f.id.toLowerCase()];
  if(coords){
    sendCommand({type:'setWaypoint', x:coords[0], y:coords[1]});
    sendCommand({type:'notification', text:`📍 Waypoint set → Field: ${f.name}`});
  } else {
    sendCommand({type:'notification', text:`⚠ No coords mapped for field: ${f.name}`});
  }
  if(getFieldState(f)==='ready'){
    sendCommand({type:'sfx', sfx:2});
  }
}

// ─── GAME COMMUNICATION ──────────────────────────────────────────────────
function sendCommand(obj){
  window.top.postMessage(obj, '*');
}

function requestData(){
  sendCommand({type:'getData'});
}

function onGameData(data){
  // Log ALL keys to debug panel so we can identify field data keys
  logDebug(data);

  // Merge into cache
  Object.assign(gameData, data);

  // Update job pill
  if(data.job_name) document.getElementById('job-pill').textContent = data.job_name;
  if(data.tabbed !== undefined){
    document.getElementById('tab-pill').style.opacity = data.tabbed ? '1' : '0.35';
  }

  // Try to parse real fields
  const parsed = parseFieldsFromGameData(gameData);
  if(parsed.length > 0){
    fields = parsed;
    renderFields(fields);
    setStatus('Game data received', true);
  } else if(MOCK_ACTIVE){
    // No field data found — stay on mock, but note it
    setStatus('Mock data (no field keys detected)', false);
  }

  lastUpdate = new Date();
  document.getElementById('last-update').textContent = 'Updated '+lastUpdate.toLocaleTimeString();
}

// ─── DEBUG INTERCEPTOR ────────────────────────────────────────────────────
const debugLog = document.getElementById('debug-log');
const loggedKeys = new Set();

function logDebug(data){
  const panel = document.getElementById('debug-panel');
  if(!panel.classList.contains('open')) return;

  const newKeys = Object.keys(data).filter(k => !loggedKeys.has(k));
  newKeys.forEach(k => {
    loggedKeys.add(k);
    const line = document.createElement('div');
    const v = String(data[k]).substring(0,80);
    line.textContent = `${k} = ${v}`;
    // Highlight potential farming keys
    if(/farm|field|crop|seed|grow|harvest|plant/i.test(k)){
      line.style.color = '#4ec96e';
      line.style.fontWeight = 'bold';
    }
    debugLog.appendChild(line);
    debugLog.scrollTop = debugLog.scrollHeight;
  });

  if(newKeys.length > 0){
    document.getElementById('debug-log').firstChild &&
      (document.getElementById('debug-log').firstChild.textContent === 'Waiting for game data…') &&
      debugLog.removeChild(debugLog.firstChild);
  }
}

// ─── AUTO REFRESH ─────────────────────────────────────────────────────────
function startAuto(ms){
  stopAuto();
  if(!ms) return;
  autoInterval = ms;
  autoTimer = setInterval(()=>requestData(), ms);
}
function stopAuto(){ if(autoTimer){ clearInterval(autoTimer); autoTimer=null; } }

// ─── STATUS ───────────────────────────────────────────────────────────────
function setStatus(msg, ok){
  const el = document.getElementById('status-txt');
  el.textContent = msg;
  el.style.color = ok ? 'var(--accent)' : 'var(--dim)';
}

// ─── DRAG ─────────────────────────────────────────────────────────────────
(function(){
  const hud  = document.getElementById('hud');
  const bar  = document.getElementById('titlebar');
  let dragging=false, sx=0, sy=0, ox=0, oy=0;
  bar.addEventListener('mousedown', e=>{
    dragging=true; sx=e.clientX; sy=e.clientY;
    const r=hud.getBoundingClientRect(); ox=r.left; oy=r.top;
    e.preventDefault();
  });
  window.addEventListener('mousemove', e=>{
    if(!dragging) return;
    hud.style.left=(ox+(e.clientX-sx))+'px';
    hud.style.top= (oy+(e.clientY-sy))+'px';
    hud.style.right='auto'; hud.style.bottom='auto';
  });
  window.addEventListener('mouseup', ()=>dragging=false);
})();

// ─── TOOLBAR EVENTS ───────────────────────────────────────────────────────
document.getElementById('btn-refresh').addEventListener('click', ()=>{
  requestData();
  setStatus('Manual refresh…', false);
  if(MOCK_ACTIVE) fields = buildMockFields();
  renderFields(fields);
});

document.getElementById('btn-layout').addEventListener('click', ()=>{
  isGrid = !isGrid;
  const container = document.getElementById('field-container');
  const btn = document.getElementById('btn-layout');
  container.className = isGrid ? 'grid' : 'list';
  btn.textContent = isGrid ? '☰ List' : '⊞ Grid';
  renderFields(fields);
});

document.getElementById('refresh-select').addEventListener('change', e=>{
  const val = parseInt(e.target.value);
  startAuto(val);
  document.getElementById('live-pill').style.display = val ? 'inline' : 'none';
});

document.getElementById('btn-debug').addEventListener('click', ()=>{
  document.getElementById('debug-panel').classList.toggle('open');
});

// ─── MESSAGE LISTENER (FiveM → app) ──────────────────────────────────────
window.addEventListener('message', e => {
  if(!e.data || typeof e.data !== 'object') return;
  onGameData(e.data);
});

// ─── INIT ─────────────────────────────────────────────────────────────────
if(MOCK_ACTIVE){
  fields = buildMockFields();
  renderFields(fields);
  setStatus('Mock mode — waiting for game connection', false);
}

// Live countdown tick — every second regardless of refresh setting
setInterval(tickTimers, 1000);

// Auto refresh default 1s
startAuto(1000);

// Request initial data dump
requestData();

// Pin app on load (visible but doesn't steal focus)
sendCommand({type:'pin'});

})();
</script>
