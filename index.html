<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Farm HUD – Transport Tycoon</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --panel:#0f1420dd;--border:rgba(80,200,120,0.18);--accent:#4ec96e;
  --accent2:#e8a020;--accent3:#e05555;--dim:rgba(255,255,255,0.35);
  --text:#d4e8d4;--mono:'Share Tech Mono',monospace;--sans:'Rajdhani',sans-serif;
}
html,body{height:100%;margin:0;padding:0;background:transparent}
body{pointer-events:none;font-family:var(--sans);color:var(--text);overflow:hidden}
#hud{
  position:fixed;bottom:16px;right:16px;
  width:380px;
  background:var(--panel);border:1px solid var(--border);border-radius:10px;
  overflow:hidden;backdrop-filter:blur(14px);
  box-shadow:0 8px 32px rgba(0,0,0,.6),0 0 0 1px rgba(78,201,110,.06);
  pointer-events:auto;resize:both;min-width:280px;
  display:flex;flex-direction:column;font-size:13px;
  max-height:90vh;
}
#titlebar{
  display:flex;align-items:center;gap:8px;background:rgba(10,13,18,.92);
  border-bottom:1px solid var(--border);padding:7px 10px;cursor:move;user-select:none;flex-shrink:0;
}
.logo{font-family:var(--mono);font-size:11px;color:var(--accent);letter-spacing:.12em;text-transform:uppercase;white-space:nowrap}
.spacer{flex:1}
.pill{font-family:var(--mono);font-size:10px;color:var(--dim);background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:4px;padding:2px 6px;white-space:nowrap}
.pill.live{color:var(--accent);border-color:rgba(78,201,110,.25);animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.45}}
#toolbar{display:flex;align-items:center;gap:6px;padding:6px 10px;border-bottom:1px solid var(--border);background:rgba(10,13,18,.5);flex-shrink:0}
.tbtn{font-family:var(--sans);font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:var(--text);border-radius:5px;padding:4px 10px;cursor:pointer;transition:background .15s,border-color .15s,color .15s}
.tbtn:hover{background:rgba(78,201,110,.12);border-color:rgba(78,201,110,.35);color:var(--accent)}
#refresh-select{font-family:var(--mono);font-size:11px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:var(--text);border-radius:5px;padding:4px 6px;cursor:pointer}
#refresh-select:focus{outline:none}
#xp-bar{display:flex;align-items:center;gap:8px;padding:5px 10px;border-bottom:1px solid var(--border);background:rgba(10,13,18,.3);flex-shrink:0}
.xp-label{font-family:var(--mono);font-size:10px;color:var(--dim);white-space:nowrap}
.xp-track{flex:1;height:4px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden}
.xp-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .6s}
.xp-val{font-family:var(--mono);font-size:10px;color:var(--accent);white-space:nowrap}
.xp-lvl{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--accent);white-space:nowrap}
#summary{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
.sumcell{flex:1;text-align:center;padding:6px 4px;border-right:1px solid var(--border);font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.05em}
.sumcell:last-child{border-right:none}
.sumcell .val{display:block;font-family:var(--mono);font-size:16px;color:var(--text);line-height:1.2}
.sumcell .val.green{color:var(--accent)}
.sumcell .val.yellow{color:var(--accent2)}
#field-container{overflow-y:auto;padding:8px;scrollbar-width:thin;scrollbar-color:rgba(78,201,110,.2) transparent;min-height:0;flex-shrink:1}
#field-container.list .field-card{display:flex;align-items:center;gap:10px;padding:7px 10px;margin-bottom:4px;border-radius:6px;border:1px solid var(--border);background:rgba(255,255,255,.025);cursor:pointer;transition:background .12s,border-color .12s;position:relative;overflow:hidden}
#field-container.list .field-card:hover{background:rgba(78,201,110,.07);border-color:rgba(78,201,110,.3)}
#field-container.list .field-card .fn{font-weight:700;font-size:13px;min-width:72px;text-transform:uppercase;letter-spacing:.04em}
#field-container.list .field-card .seed{font-family:var(--mono);font-size:11px;color:var(--dim);flex:1}
#field-container.list .field-card .timer{font-family:var(--mono);font-size:12px;font-weight:600;min-width:70px;text-align:right}
#field-container.list .field-card .state-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
#field-container.list .field-card .prog-bar{position:absolute;bottom:0;left:0;height:2px;transition:width .5s}
#field-container.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;align-content:start}
#field-container.grid .field-card{display:flex;flex-direction:column;gap:5px;padding:10px;border-radius:7px;border:1px solid var(--border);background:rgba(255,255,255,.025);cursor:pointer;transition:background .12s,border-color .12s;position:relative;overflow:hidden}
#field-container.grid .field-card:hover{background:rgba(78,201,110,.07);border-color:rgba(78,201,110,.3)}
#field-container.grid .field-card .fn{font-weight:700;font-size:13px;text-transform:uppercase;letter-spacing:.04em}
#field-container.grid .field-card .seed{font-family:var(--mono);font-size:11px;color:var(--dim)}
#field-container.grid .field-card .timer{font-family:var(--mono);font-size:15px;font-weight:600;margin-top:4px}
#field-container.grid .field-card .state-dot{position:absolute;top:8px;right:8px;width:8px;height:8px;border-radius:50%}
#field-container.grid .field-card .prog-bar{position:absolute;bottom:0;left:0;height:3px;transition:width .5s}
.state-ready .state-dot{background:var(--accent);box-shadow:0 0 6px var(--accent)}
.state-ready .timer{color:var(--accent)}
.state-ready .prog-bar{background:var(--accent);width:100%!important}
.state-ready{border-color:rgba(78,201,110,.4)!important}
.state-soon .state-dot{background:var(--accent2);box-shadow:0 0 6px var(--accent2)}
.state-soon .timer{color:var(--accent2)}
.state-soon .prog-bar{background:var(--accent2)}
.state-growing .state-dot{background:#4a90d9;box-shadow:0 0 6px #4a90d9}
.state-growing .timer{color:#4a90d9}
.state-growing .prog-bar{background:#4a90d9}
#empty-state{display:none;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:28px 16px;color:var(--dim);font-size:12px;font-family:var(--mono);text-align:center}
#empty-state .icon{font-size:26px;opacity:.4}
#debug-panel{display:none;flex-direction:column;gap:6px;padding:8px;border-top:1px solid var(--border);background:rgba(0,0,0,.4);flex-shrink:0}
#debug-panel.open{display:flex}
#debug-panel h4{font-family:var(--mono);font-size:10px;color:var(--accent);letter-spacing:.1em;text-transform:uppercase}
#debug-status-box{background:rgba(0,0,0,.5);border:1px solid rgba(78,201,110,.2);border-radius:5px;padding:8px}
.dsb-header{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.dsb-label{font-family:var(--mono);font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.08em;flex:1}
.dbtn{font-family:var(--mono);font-size:10px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:var(--text);border-radius:4px;padding:2px 8px;cursor:pointer}
.dbtn:hover{background:rgba(78,201,110,.15);border-color:rgba(78,201,110,.3);color:var(--accent)}
#debug-status-raw{font-family:var(--mono);font-size:11px;color:rgba(255,255,255,.75);word-break:break-all;white-space:pre-wrap;line-height:1.7;max-height:180px;overflow-y:auto;scrollbar-width:thin}
.line-entry{display:block;padding:2px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.line-entry:last-child{border-bottom:none}
#debug-log{font-family:var(--mono);font-size:10px;color:rgba(255,255,255,.4);word-break:break-all;line-height:1.6;max-height:80px;overflow-y:auto;scrollbar-width:thin}
#statusbar{display:flex;align-items:center;gap:8px;padding:4px 10px;border-top:1px solid var(--border);background:rgba(10,13,18,.8);flex-shrink:0;font-family:var(--mono);font-size:10px;color:var(--dim);margin-top:auto}
#statusbar .last-update{margin-left:auto}
</style>
</head>
<body>
<div id="hud">
  <div id="titlebar">
    <span class="logo">🌾 Farm HUD</span>
    <span class="pill live" id="live-pill">● LIVE</span>
    <span class="pill" id="tab-pill">TABBED</span>
    <span class="spacer"></span>
    <span class="pill" id="job-pill">—</span>
  </div>
  <div id="toolbar">
    <button class="tbtn" id="btn-refresh">↺ Refresh</button>
    <button class="tbtn" id="btn-layout">⊞ Grid</button>
    <button class="tbtn" id="btn-clear" title="Clear all tracked fields">🗑 Clear</button>
    <select id="refresh-select">
      <option value="0">Auto: Off</option>
      <option value="1000" selected>Auto: 1s</option>
      <option value="60000">Auto: 1m</option>
      <option value="600000">Auto: 10m</option>
      <option value="3600000">Auto: 1h</option>
    </select>
    <span style="flex:1"></span>
    <button class="tbtn" id="btn-debug">🛠</button>
  </div>
  <div id="xp-bar">
    <span class="xp-lvl" id="xp-lvl">🌾 XP</span>
    <div class="xp-track"><div class="xp-fill" id="xp-fill" style="width:0%"></div></div>
    <span class="xp-val" id="xp-val">— XP</span>
    <button class="dbtn" id="btn-xp-milestone" style="margin-left:4px;padding:2px 6px;font-size:10px">1M</button>
  </div>
  <div id="summary">
    <div class="sumcell"><span class="val green" id="sum-ready">0</span>Ready</div>
    <div class="sumcell"><span class="val yellow" id="sum-soon">0</span>&lt; 1h</div>
    <div class="sumcell"><span class="val" id="sum-growing">0</span>Growing</div>
    <div class="sumcell"><span class="val" id="sum-total">0</span>Tracked</div>
  </div>
  <div id="field-container" class="list">
    <div id="empty-state">
      <span class="icon">🌱</span>
      <span>Walk onto a growing or ready field<br>to start tracking it here.</span>
    </div>
  </div>
  <div id="debug-panel">
    <h4>⚡ Debug — stand on a field then check below</h4>
    <div id="debug-status-box">
      <div class="dsb-header">
        <span class="dsb-label" id="dsb-label">STATUS KEY — WAITING…</span>
        <button class="dbtn" id="btn-copy-raw">Copy raw</button>
        <button class="dbtn" id="btn-copy-lines">Copy lines[]</button>
      </div>
      <div id="debug-status-raw">Step on a field in-game to see data here.</div>
    </div>
    <hr style="border:none;border-top:1px solid var(--border);margin:2px 0">
    <div id="debug-log"></div>
  </div>
  <div id="statusbar">
    <span id="status-txt">Waiting for game data…</span>
    <span class="last-update" id="last-update">—</span>
    <span class="pill" style="margin-left:6px;opacity:.4">v0.21</span>
  </div>
</div>
<script>
(function(){

const SEED_TIMES={carrot:900,potato:2700,tomato:3600,corn:5400,wheat:6300,strawberry:7200,pumpkin:10800,apple:14400,orange:18000,grape:21600,peach:25200,cherry:28800,pear:32400,banana:39600,mango:46800,pineapple:54000,watermelon:57600,blueberry:64800,raspberry:72000,blackberry:86400};
const SEED_EMOJI={carrot:'🥕',potato:'🥔',tomato:'🍅',corn:'🌽',wheat:'🌾',strawberry:'🍓',pumpkin:'🎃',apple:'🍎',orange:'🍊',grape:'🍇',peach:'🍑',cherry:'🍒',pear:'🍐',banana:'🍌',mango:'🥭',pineapple:'🍍',watermelon:'🍉',blueberry:'🫐',raspberry:'🍓',blackberry:'🫐'};

const fieldCache={};
let isGrid=false,autoTimer=null,lastStatusRaw='';

// XP — raw value + progress to next milestone (1M or 10M)
let xpMilestoneSize = 1000000;
let lastXpRaw = 0;

function updateXP(raw){
  lastXpRaw = parseFloat(raw);
  if(isNaN(lastXpRaw)) return;
  renderXP();
}

function renderXP(){
  const xp = lastXpRaw;
  const ms = xpMilestoneSize;
  const prev = Math.floor(xp/ms)*ms;
  const next = prev+ms;
  const pct  = Math.min(100,((xp-prev)/ms)*100);
  const fmt  = v => v>=1000000?(v/1000000).toFixed(v%1000000===0?0:2)+'M':v>=1000?(v/1000).toFixed(1)+'k':Math.floor(v).toString();
  document.getElementById('xp-lvl').textContent = '🌾 XP';
  document.getElementById('xp-val').textContent = fmt(xp)+' / '+fmt(next);
  document.getElementById('xp-fill').style.width = pct.toFixed(1)+'%';
}

document.getElementById('btn-xp-milestone').addEventListener('click',()=>{
  xpMilestoneSize = xpMilestoneSize === 1000000 ? 10000000 : 1000000;
  document.getElementById('btn-xp-milestone').textContent = xpMilestoneSize === 1000000 ? '1M' : '10M';
  renderXP();
});

// Field name lookup by area (m²) from wiki
const FIELD_BY_AREA={
  1907:'Box',2024:'Pressure',2175:'Cable',2419:'Pencil',2744:'Chocolate',
  3271:'Boom',3393:'Controller',3652:'Coffee',3859:'Tango',3954:'Syringe',
  3997:'Screw',6688:'Chips',6750:'Wire',6911:'Sport',7095:'Arizona',
  7163:'Liquid',7313:'Mug',8227:'Taco',10481:'Mach',10916:'Tornado',
  10973:'Pokemon',11182:'Temp',15766:'Pipe',32022:'Lamp',41077:'Socket'
};

function fieldNameFromStatus(lines,titleRaw){
  for(const l of lines){
    const m=l.replace(/~[a-zA-Z*]~/g,'').match(/Total area\s+([\d]+)\s*m/i);
    if(m){
      const area=parseInt(m[1]);
      if(FIELD_BY_AREA[area]) return FIELD_BY_AREA[area];
      const keys=Object.keys(FIELD_BY_AREA).map(Number);
      const closest=keys.reduce((a,b)=>Math.abs(b-area)<Math.abs(a-area)?b:a);
      if(Math.abs(closest-area)<100) return FIELD_BY_AREA[closest];
      return 'Field '+area+'m²';
    }
  }
  return null; // No area found — caller should use existing cache name
}
function parseStatus(raw){
  let p;try{p=JSON.parse(raw)}catch(e){return}
  const lines=p.lines||[];
  if(!lines.length) return;
  const detectedName=fieldNameFromStatus(lines, p.title||'');
  const s0=(lines[0]||'').replace(/~[a-zA-Z*]~/g,'');
  const sm=s0.match(/Status:\s*(\w+)/i);
  const status=sm?sm[1].toLowerCase():'';
  if(!status) return;
  let seed='unknown';
  lines.forEach(l=>{const m=l.replace(/~[a-zA-Z*]~/g,'').match(/Crop:\s*(\w+)/i);if(m)seed=m[1].toLowerCase()});
  const growSecs_fallback=SEED_TIMES[seed]||0;

  // Find existing cached entry — if we have a confirmed name use it, otherwise use detected
  // This prevents "Farmer" from overwriting a previously identified field name
  let existing=null;
  if(detectedName){
    existing=fieldCache[detectedName]||null;
  } else {
    // No area in status — try to find the only tracked field as a best guess
    const cached=Object.values(fieldCache);
    if(cached.length===1) existing=cached[0];
  }
  const fieldName=detectedName||(existing&&existing.name)||'Unknown';

  if(status==='harvest'||status==='ready'){
    fieldCache[fieldName]={...(existing||{}),name:fieldName,seed,remainingSecs:0,growTimeSecs:growSecs_fallback,seenAt:Date.now(),status:'ready',fertilized:(existing&&existing.fertilized)||false};
    return;
  }
  if(status==='growing'){
    let remSecs=0;
    lines.forEach(l=>{const m=l.replace(/~[a-zA-Z*]~/g,'').match(/Time Remaining:\s*([\d.]+)\s*min/i);if(m)remSecs=parseFloat(m[1])*60});
    let growSecs=growSecs_fallback;
    lines.forEach(l=>{const m=l.replace(/~[a-zA-Z*]~/g,'').match(/Growth Time:\s*([\d.]+)\s*min/i);if(m)growSecs=parseFloat(m[1])*60});
    fieldCache[fieldName]={...(existing||{}),name:fieldName,seed,remainingSecs:remSecs,growTimeSecs:growSecs,seenAt:Date.now(),status:'growing',fertilized:(existing&&existing.fertilized)||false};
    return;
  }
  if(status==='fertilize'){
    if(existing) existing.fertilized=true;
    else if(detectedName) fieldCache[detectedName]={name:detectedName,seed,remainingSecs:0,growTimeSecs:growSecs_fallback,seenAt:Date.now(),status:'fertilizing',fertilized:true};
    return;
  }
  // Cultivate/Plant — only remove if we have confirmed area
  if(detectedName && fieldCache[detectedName]) delete fieldCache[detectedName];
}

function getRem(f){if(f.status==='ready')return 0;return Math.max(0,f.remainingSecs-(Date.now()-f.seenAt)/1000)}
function getState(f){const r=getRem(f);if(r<=0)return'ready';if(r<3600)return'soon';return'growing'}
function fmtTime(s){if(s<=0)return'READY';const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sc=Math.floor(s%60);if(h>0)return h+'h '+String(m).padStart(2,'0')+'m';if(m>0)return m+'m '+String(sc).padStart(2,'0')+'s';return sc+'s'}
function emoji(s){return SEED_EMOJI[s]||'🌱'}

function render(){
  const container=document.getElementById('field-container');
  const empty=document.getElementById('empty-state');
  container.querySelectorAll('.field-card').forEach(c=>c.remove());
  const list=Object.values(fieldCache);
  if(!list.length){empty.style.display='flex';updateSummary([]);return}
  empty.style.display='none';
  list.sort((a,b)=>getRem(a)-getRem(b));
  list.forEach(f=>{
    const rem=getRem(f),state=getState(f);
    const prog=f.growTimeSecs>0?Math.min(1,(f.growTimeSecs-rem)/f.growTimeSecs):1;
    const card=document.createElement('div');
    card.className='field-card state-'+state;
    card.dataset.id=f.name;
    const seedLabel=f.seed.charAt(0).toUpperCase()+f.seed.slice(1);
    const fertBadge=f.fertilized?'<span style="font-size:10px;background:rgba(232,160,32,.15);border:1px solid rgba(232,160,32,.3);color:#e8a020;border-radius:3px;padding:1px 5px;font-family:var(--mono)">⚗ FERT</span>':'';
    if(isGrid){
      card.innerHTML=`<span class="state-dot"></span><div class="fn">${emoji(f.seed)} ${f.name}</div><div class="seed">${seedLabel}</div>${fertBadge}<div class="timer">${fmtTime(rem)}</div><div class="prog-bar" style="width:${(prog*100).toFixed(1)}%"></div>`;
    }else{
      card.innerHTML=`<span class="state-dot"></span><span class="fn">${emoji(f.seed)} ${f.name}</span><span class="seed">${seedLabel}</span>${fertBadge}<span class="timer">${fmtTime(rem)}</span><div class="prog-bar" style="width:${(prog*100).toFixed(1)}%"></div>`;
    }
    card.addEventListener('click',()=>{
      sendCommand({type:'notification',text:'🌾 '+f.name+' — '+seedLabel+' — '+fmtTime(rem)});
      if(state==='ready')sendCommand({type:'sfx',sfx:2});
    });
    container.appendChild(card);
  });
  updateSummary(list);
}

function updateSummary(list){
  document.getElementById('sum-ready').textContent=list.filter(f=>getState(f)==='ready').length;
  document.getElementById('sum-soon').textContent=list.filter(f=>getState(f)==='soon').length;
  document.getElementById('sum-growing').textContent=list.filter(f=>getState(f)==='growing').length;
  document.getElementById('sum-total').textContent=list.length;
}

function tick(){
  Object.values(fieldCache).forEach(f=>{
    const card=document.querySelector('.field-card[data-id="'+f.name+'"]');
    if(!card)return;
    const rem=getRem(f),state=getState(f);
    const prog=f.growTimeSecs>0?Math.min(1,(f.growTimeSecs-rem)/f.growTimeSecs):1;
    card.className='field-card state-'+state;
    const t=card.querySelector('.timer'),b=card.querySelector('.prog-bar');
    if(t)t.textContent=fmtTime(rem);
    if(b)b.style.width=(prog*100).toFixed(1)+'%';
  });
  updateSummary(Object.values(fieldCache));
}

function sendCommand(obj){window.top.postMessage(obj,'*')}
function requestData(){sendCommand({type:'getData'})}

function onGameData(data){
  logDebug(data);
  if(data.status!==undefined)parseStatus(String(data.status));
  if(data.exp_farming_farming!==undefined)updateXP(data.exp_farming_farming);
  if(data.job_name)document.getElementById('job-pill').textContent=data.job_name;
  else if(data.job)document.getElementById('job-pill').textContent=data.job;
  if(data.tabbed!==undefined)document.getElementById('tab-pill').style.opacity=data.tabbed?'1':'0.35';
  render();
  document.getElementById('last-update').textContent='Updated '+new Date().toLocaleTimeString();
  document.getElementById('status-txt').style.color='var(--accent)';
  document.getElementById('status-txt').textContent='Connected';
}

// DEBUG
const debugLog=document.getElementById('debug-log');
const debugRaw=document.getElementById('debug-status-raw');
const dsbLabel=document.getElementById('dsb-label');
const loggedKeys=new Set();

function logDebug(data){
  if(data.status!==undefined){
    lastStatusRaw=String(data.status);
    dsbLabel.textContent='STATUS KEY — LIVE ✓';dsbLabel.style.color='var(--accent)';
    debugRaw.innerHTML='';
    try{
      const p=JSON.parse(lastStatusRaw);
      if(p.lines){
        p.lines.forEach((l,i)=>{const s=document.createElement('span');s.className='line-entry';s.textContent='['+i+'] '+l.replace(/~[a-zA-Z*]~/g,'');s.style.color='rgba(255,255,255,.85)';debugRaw.appendChild(s)});
        const pre=document.createElement('span');pre.className='line-entry';pre.style.cssText='color:rgba(255,255,255,.3);margin-top:6px;display:block';pre.textContent='── raw ──\n'+JSON.stringify(p,null,2);debugRaw.appendChild(pre);
      }else{debugRaw.textContent=JSON.stringify(p,null,2)}
    }catch(e){debugRaw.textContent=lastStatusRaw}
  }
  const newKeys=Object.keys(data).filter(k=>k!=='status'&&!loggedKeys.has(k));
  newKeys.forEach(k=>{
    loggedKeys.add(k);
    if(!document.getElementById('debug-panel').classList.contains('open'))return;
    const d=document.createElement('div');d.textContent=k+' = '+String(data[k]).substring(0,100);
    if(/farm|field|crop|seed|grow|harvest|plant/i.test(k)){d.style.color='#4ec96e';d.style.fontWeight='bold'}
    debugLog.appendChild(d);debugLog.scrollTop=debugLog.scrollHeight;
  });
}

document.getElementById('btn-copy-raw').addEventListener('click',()=>{
  if(!lastStatusRaw){sendCommand({type:'notification',text:'No status yet'});return}
  navigator.clipboard.writeText(lastStatusRaw).catch(()=>sendCommand({type:'notification',text:lastStatusRaw.substring(0,100)}));
});
document.getElementById('btn-copy-lines').addEventListener('click',()=>{
  if(!lastStatusRaw)return;
  try{const p=JSON.parse(lastStatusRaw);navigator.clipboard.writeText((p.lines||[]).map(l=>l.replace(/~[a-zA-Z*]~/g,'')).join('\n'))}catch(e){}
});

// MESSAGE LISTENER
window.addEventListener('message',e=>{
  if(!e.data||typeof e.data!=='object')return;
  const msg=e.data;
  if(msg.type==='data'&&msg.data&&typeof msg.data==='object'){onGameData(msg.data);return}
  if(!msg.type){onGameData(msg);return}
  if(msg.type==='data'){const o=Object.assign({},msg);delete o.type;delete o.fromTycoonScript;if(Object.keys(o).length>0)onGameData(o)}
});

// DRAG
(function(){
  const hud=document.getElementById('hud'),bar=document.getElementById('titlebar');
  let drag=false,sx=0,sy=0,ox=0,oy=0;
  bar.addEventListener('mousedown',e=>{
    drag=true;sx=e.clientX;sy=e.clientY;
    const r=hud.getBoundingClientRect();ox=r.left;oy=r.top;
    // Switch to top/left positioning for dragging
    hud.style.left=ox+'px';hud.style.top=oy+'px';
    hud.style.right='auto';hud.style.bottom='auto';
    e.preventDefault();
  });
  window.addEventListener('mousemove',e=>{if(!drag)return;hud.style.left=(ox+e.clientX-sx)+'px';hud.style.top=(oy+e.clientY-sy)+'px'});
  window.addEventListener('mouseup',()=>drag=false);
})();

document.getElementById('btn-clear').addEventListener('click',()=>{
  Object.keys(fieldCache).forEach(k=>delete fieldCache[k]);
  render();
  sendCommand({type:'notification',text:'🗑 Field cache cleared'});
});
document.getElementById('btn-refresh').addEventListener('click',requestData);
document.getElementById('btn-layout').addEventListener('click',()=>{
  isGrid=!isGrid;
  document.getElementById('field-container').className=isGrid?'grid':'list';
  document.getElementById('btn-layout').textContent=isGrid?'☰ List':'⊞ Grid';
  render();
});
document.getElementById('refresh-select').addEventListener('change',e=>{
  clearInterval(autoTimer);const v=parseInt(e.target.value);
  if(v)autoTimer=setInterval(requestData,v);
  document.getElementById('live-pill').style.display=v?'inline':'none';
});
document.getElementById('btn-debug').addEventListener('click',()=>document.getElementById('debug-panel').classList.toggle('open'));

setInterval(tick,1000);
autoTimer=setInterval(requestData,1000);
requestData();
sendCommand({type:'pin'});

})();
</script>
</body>
